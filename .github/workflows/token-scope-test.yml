name: Token Scope Test
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  packages: read

jobs:
  test-token-scope:
    runs-on: ubuntu-latest
    steps:
      - name: Token whoami
        run: |
          echo '=== GITHUB_TOKEN scope test ==='
          echo 'Repo: ${{ github.repository }}'
          
      - name: Test cross-repo access (private-test-repo)
        continue-on-error: true
        run: |
          echo '--- Cross-repo content access ---'
          RESP=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"             "https://api.github.com/repos/tooforg/private-test-repo/contents/")
          echo "private-test-repo contents: HTTP $RESP"
          
      - name: Test org secrets access
        continue-on-error: true
        run: |
          echo '--- Org secrets enumeration ---'
          RESP=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"             "https://api.github.com/orgs/tooforg/actions/secrets")
          echo "org secrets: HTTP $RESP"

      - name: Test other repo Actions access
        continue-on-error: true
        run: |
          echo '--- Other repo Actions access ---'
          RESP=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"             "https://api.github.com/repos/tooforg/private-test-repo/actions/runs")
          echo "private-test-repo actions runs: HTTP $RESP"
          
      - name: Test org members enumeration
        continue-on-error: true
        run: |
          echo '--- Org members access ---'
          RESP=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"             "https://api.github.com/orgs/tooforg/members")
          echo "org members: $RESP"
          
      - name: Test GraphQL cross-repo
        continue-on-error: true
        run: |
          echo '--- GraphQL cross-repo access ---'
          RESP=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"             -H "Content-Type: application/json"             -d '{"query": "{ repository(owner: \"tooforg\", name: \"private-test-repo\") { name isPrivate defaultBranchRef { target { ... on Commit { message } } } } }"}'             "https://api.github.com/graphql")
          echo "GraphQL private-test-repo: $RESP"
          
      - name: Test package cross-repo access
        continue-on-error: true
        run: |
          echo '--- Package cross-repo access ---'
          RESP=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"             "https://api.github.com/orgs/tooforg/packages?package_type=container")
          echo "org packages: HTTP $RESP"
          
      - name: Test token permissions
        continue-on-error: true
        run: |
          echo '--- Token permission headers ---'
          curl -s -I -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"             "https://api.github.com/repos/tooforg/public-test-repo" 2>&1 | grep -i "x-oauth-scopes\|x-accepted-oauth-scopes\|x-github-request-id"
